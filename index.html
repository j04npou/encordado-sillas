<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encordado de sillas</title>
    <meta name="theme-color" content="#1e7c6b" />
    <link rel="icon" href="assets/chair-favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="tool-panel" aria-label="Herramientas de patronaje">
        <div class="brand-block">
          <span class="brand-icon" style="--icon: url('assets/chair.svg')" aria-hidden="true"></span>
          <div class="brand-text">
            <p class="eyebrow">Patrones de tejido</p>
            <h1>Encordado de sillas</h1>
          </div>
        </div>

        <div class="mode-tabs" role="tablist" aria-label="Modo de trabajo">
          <button class="mode-tab is-active" id="designModeBtn" type="button" role="tab" aria-selected="true">
            Diseño
          </button>
          <button class="mode-tab" id="weaveModeBtn" type="button" role="tab" aria-selected="false">
            Tejer
          </button>
        </div>

        <section class="tool-section" data-panel="design">
          <h2>Tamaño</h2>
          <div class="field-grid">
            <label>
              <span>Filas</span>
              <input id="rowsInput" type="number" min="1" max="120" value="18" />
            </label>
            <label>
              <span>Columnas</span>
              <input id="colsInput" type="number" min="1" max="120" value="24" />
            </label>
          </div>
          <label class="check-row">
            <input id="tallCellsInput" type="checkbox" />
            <span>Proporción real (alto ×2)</span>
          </label>
          <label class="check-row" id="widePixelsRow" hidden>
            <input id="widePixelsInput" type="checkbox" />
            <span>Píxel cuadrado (duplica columnas)</span>
          </label>
        </section>

        <section class="tool-section" data-panel="design">
          <h2>Dibujo</h2>
          <div class="segmented" aria-label="Herramienta activa">
            <button class="segment labeled-button is-active" data-tool="paint" type="button">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/pencil.svg')" aria-hidden="true"></span>
                <span>Pintar</span>
              </span>
              <kbd class="key-hint">P</kbd>
            </button>
            <button class="segment labeled-button" data-tool="erase" type="button">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/eraser.svg')" aria-hidden="true"></span>
                <span>Borrar</span>
              </span>
              <kbd class="key-hint">B</kbd>
            </button>
            <button class="segment labeled-button" data-tool="select" type="button">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/square-dashed.svg')" aria-hidden="true"></span>
                <span>Seleccionar</span>
              </span>
              <kbd class="key-hint">S</kbd>
            </button>
            <button class="segment labeled-button" data-tool="move" type="button">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/arrows-alt.svg')" aria-hidden="true"></span>
                <span>Mover</span>
              </span>
              <kbd class="key-hint">M</kbd>
            </button>
          </div>
          <button class="ghost-button labeled-button" id="clearBtn" type="button">
            <span class="button-line">
              <span class="button-icon" style="--icon: url('assets/broom-wide.svg')" aria-hidden="true"></span>
              <span>Limpiar cuadrícula</span>
            </span>
          </button>
        </section>

        <section class="tool-section" data-panel="design">
          <h2>Edición</h2>
          <div class="button-row">
            <button class="ghost-button labeled-button" id="undoBtn" type="button" title="Deshacer">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/undo.svg')" aria-hidden="true"></span>
                <span>Deshacer</span>
              </span>
              <kbd class="key-hint">Ctrl+Z</kbd>
            </button>
            <button class="ghost-button labeled-button" id="redoBtn" type="button" title="Rehacer">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/redo.svg')" aria-hidden="true"></span>
                <span>Rehacer</span>
              </span>
              <kbd class="key-hint">Ctrl+Y</kbd>
            </button>
          </div>
          <div class="button-row">
            <button class="ghost-button labeled-button" id="copyBtn" type="button" title="Copiar la selección">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/copy.svg')" aria-hidden="true"></span>
                <span>Copiar</span>
              </span>
              <kbd class="key-hint">Ctrl+C</kbd>
            </button>
            <button class="ghost-button labeled-button" id="cutBtn" type="button" title="Cortar la selección">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/scissors.svg')" aria-hidden="true"></span>
                <span>Cortar</span>
              </span>
              <kbd class="key-hint">Ctrl+X</kbd>
            </button>
          </div>
          <div class="button-row">
            <button class="ghost-button labeled-button" id="pasteBtn" type="button" title="Pegar el portapapeles">
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/paste.svg')" aria-hidden="true"></span>
                <span>Pegar</span>
              </span>
              <kbd class="key-hint">Ctrl+V</kbd>
            </button>
            <button
              class="ghost-button labeled-button"
              id="deleteSelBtn"
              type="button"
              title="Eliminar el contenido de la selección"
            >
              <span class="button-line">
                <span class="button-icon" style="--icon: url('assets/trash.svg')" aria-hidden="true"></span>
                <span>Eliminar</span>
              </span>
              <kbd class="key-hint">Supr</kbd>
            </button>
          </div>
        </section>

        <section class="tool-section" data-panel="design">
          <h2>Pixel art</h2>
          <label class="file-button">
            <input id="imageInput" type="file" accept="image/png,image/jpeg,image/webp" />
            Importar imagen
          </label>
          <p class="import-error" id="importError" hidden></p>
          <div class="import-controls" id="importControls" hidden>
            <label class="check-row">
              <input id="invertImageInput" type="checkbox" />
              <span>Invertir lectura</span>
            </label>
            <p class="import-hint">
              Arrastra la imagen para colocarla. Fíjala con el botón, pulsando fuera o con Enter;
              cancela con el botón, Escape o Deshacer.
            </p>
            <div class="import-actions">
              <button class="primary-button" id="stampImportBtn" type="button">Fijar imagen</button>
              <button class="ghost-button" id="cancelImportBtn" type="button">Cancelar</button>
            </div>
          </div>
        </section>

        <section class="tool-section" data-panel="design">
          <h2>Salida</h2>
          <button class="primary-button" id="exportBtn" type="button">Exportar diseño PNG</button>
          <button class="ghost-button" id="shareUrlBtn" type="button">Copiar enlace del diseño</button>
          <input class="share-url" id="shareUrlField" type="text" readonly hidden />
          <p class="share-feedback" id="shareFeedback" hidden></p>
        </section>

        <section class="tool-section" data-panel="weave" hidden>
          <h2>Lectura</h2>
          <label>
            <span>Dirección</span>
            <select id="directionInput">
              <option value="top-down">Arriba hacia abajo</option>
              <option value="bottom-up" selected>Abajo hacia arriba</option>
            </select>
          </label>
        </section>
      </aside>

      <main class="workspace">
        <section class="canvas-area" id="designView" aria-label="Lienzo de diseño">
          <div class="canvas-frame">
            <canvas id="patternCanvas" width="960" height="720"></canvas>
          </div>
          <div class="canvas-controls" role="group" aria-label="Controles de vista">
            <button id="zoomInBtn" type="button" title="Acercar" aria-label="Acercar">+</button>
            <button id="zoomOutBtn" type="button" title="Alejar" aria-label="Alejar">−</button>
            <button id="zoomFitBtn" type="button" title="Ajustar a la pantalla" aria-label="Ajustar a la pantalla">
              1:1
            </button>
            <button id="panBtn" type="button" title="Desplazar la vista" aria-label="Desplazar la vista">
              <span class="button-icon" style="--icon: url('assets/arrows-alt.svg')" aria-hidden="true"></span>
            </button>
          </div>
        </section>

        <section class="weave-area" id="weaveView" hidden aria-label="Instrucciones de tejido">
          <div class="weave-focus" id="weaveFocus" aria-live="polite">
            <button class="icon-button" id="prevColumnBtn" type="button" aria-label="Columna anterior">‹</button>
            <div class="focus-body">
              <p class="eyebrow">Columna actual</p>
              <strong id="currentColumnLabel">Columna 1</strong>
              <div class="focus-tiles" id="currentColumnTiles"></div>
            </div>
            <button class="icon-button" id="nextColumnBtn" type="button" aria-label="Columna siguiente">›</button>
          </div>
          <div class="weave-preview">
            <div class="canvas-frame">
              <canvas id="weaveCanvas" width="720" height="720"></canvas>
            </div>
          </div>
          <details class="instructions-panel" id="instructionsPanel">
            <summary class="instructions-head">
              <div>
                <p class="eyebrow">Secuencia</p>
                <h2>Instrucciones por columna</h2>
              </div>
              <span class="chevron" aria-hidden="true">›</span>
            </summary>
            <div class="instructions-list" id="instructionsList"></div>
          </details>
        </section>
      </main>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
